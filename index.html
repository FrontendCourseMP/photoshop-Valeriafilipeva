<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <title>Цифровое представление изображения — ЛР 1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Vuetify CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vuetify@3.6.0/dist/vuetify.min.css" />
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="app">
        <v-app>
            <!-- Верхняя панель -->
            <v-app-bar density="comfortable" flat>
                <div class="app-bar-content">
                    <div class="title-block">
                        <v-app-bar-title>Цифровое представление изображения</v-app-bar-title>
                        <span class="lab-subtitle">Лабораторная работа 1</span>
                    </div>

                    <span class="text-caption formats">PNG · JPG · GB7</span>
                </div>
            </v-app-bar>

            <!-- Основная область -->
            <v-main>
                <v-container class="py-4" fluid>
                    <!-- Панель управления -->
                    <v-row class="mb-4" align="center" justify="space-between">
                        <v-col cols="12" md="6">
                            <v-file-input v-model="selectedFile" label="Загрузить изображение (PNG, JPG, GB7)"
                                accept=".png,.jpg,.jpeg,.gb7" prepend-icon="mdi-file-image" density="comfortable"
                                @change="onFileChange" clearable></v-file-input>
                        </v-col>

                        <v-col cols="12" md="6" class="download-buttons">
                            <v-btn :disabled="!hasImage" @click="openSaveDialog('png')">
                                <v-icon start>mdi-download</v-icon> PNG
                            </v-btn>

                            <v-btn :disabled="!hasImage" @click="openSaveDialog('jpg')">
                                <v-icon start>mdi-download</v-icon> JPG
                            </v-btn>

                            <v-btn :disabled="!hasImage" @click="openSaveDialog('gb7')">
                                <v-icon start>mdi-download</v-icon> GB7
                            </v-btn>
                        </v-col>
                    </v-row>

                    <!-- Холст -->
                    <v-row>
                        <v-col cols="12">
                            <div class="canvas-wrapper">
                                <canvas ref="canvasRef"></canvas>
                            </div>
                        </v-col>
                    </v-row>
                </v-container>
            </v-main>

            <!-- Строка состояния -->
            <v-footer app class="status-bar" height="32">
                <div class="status-text">
                    {{ statusText }}
                </div>
            </v-footer>

            <!-- Диалог ввода имени файла -->
            <v-dialog v-model="showSaveDialog" max-width="400">
                <v-card>
                    <v-card-title class="d-flex justify-space-between align-center">
                        <span>Сохранение файла</span>
                        <v-btn icon="mdi-close" variant="text" @click="cancelSave"></v-btn>
                    </v-card-title>

                    <v-card-text>
                        <v-text-field v-model="filenameInput" label="Имя файла" density="comfortable" variant="outlined"
                            hide-details="auto"></v-text-field>
                    </v-card-text>

                    <v-card-actions class="justify-end">
                        <v-btn variant="text" @click="cancelSave">Отмена</v-btn>
                        <v-btn color="primary" variant="flat" @click="confirmSave">Сохранить</v-btn>
                    </v-card-actions>
                </v-card>
            </v-dialog>
        </v-app>
    </div>

    <!-- Vue -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- Vuetify -->
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.6.0/dist/vuetify.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
